type: object
properties:
  employee_id:
    type: string
    example: "JIN0001"
    description: "社員番号"
  evaluations:
    type: array
    items:
      type: object
      properties:
        id:
          type: string
          example: "1"
          description: "評価ID<br>従業員管理＞評価で表示されるNo.（連番）です。"
        eval_on:
          type: string
          format: date
          pattern: yyyy-MM-dd
          example: "2024-04-13"
          description: "評価実施年月日"
        period_start_on:
          type: string
          format: date
          pattern: yyyy-MM-dd
          example: "2024-04-13"
          description: "人事評価対象期間（自）"
        period_end_on:
          type: string
          format: date
          pattern: yyyy-MM-dd
          example: "2024-04-13"
          description: "人事評価対象期間（至）"
        eval_system:
          type: string
          example: "成果評価"
          description: "実施評価体系"
        evaluator_id:
          type: string
          example: "2"
          description: "評価者 社員番号"
        score:
          type: string
          example: "2"
          description: "評価pt"
        eval_result:
          type: string
          example: "2"
          description: "評価判定"
        performance_classification:
          type: object
          properties:
            id:
              type: string
              example: "1"
              description: "パフォーマンス区分ID<br>1:ハイパフォーマー<br>2:ミドルパフォーマー <br>3:ローパフォーマー"
            name:
              type: string
              example: "ハイパフォーマー"
              description: "パフォーマンス区分"
        remarks:
          type: string
          example: "◯◯という備考です。"
          description: "備考"
        created_at:
          type: string
          format: datetime
          pattern: yyyy-MM-dd hh:mm:ss
          example: "2024-04-13 12:34:56"
          description: "作成日時"
        updated_at:
          type: string
          format: datetime
          pattern: yyyy-MM-dd hh:mm:ss
          example: "2024-04-13 12:34:56"
          description: "更新日時"
