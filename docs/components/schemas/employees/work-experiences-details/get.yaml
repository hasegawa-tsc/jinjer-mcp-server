type: object
properties:
  employee_id:
    type: string
    description: "社員番号"
    example: "JIN0001"
  classify_experiences:
    type: object
    properties:
      middle_classification:
        type: object
        properties:
          id:
            description: "中途区分ID (0:中途入社以外, 1: 中途入社)"
            type: string
            example: "1"
          name:
            description: "中途区分"
            type: string
            example: "中途入社"
      midway_income_amount:
        description: "中途収入金額"
        type: integer
        example: 1234567
      middle_social_insurance:
        description: "中途社会保険"
        type: integer
        example: 123456
      middle_income_tax:
        description: "中途所得税"
        type: integer
        example: 123456
      pre_slipx:
        type: object
        properties:
          name:
            description: "前職源泉徴収票<br>ファイル名"
            type: string
            example: "令和4年源泉徴収票.jpg"
          extension:
            description: "前職源泉徴収票<br>ファイル拡張子"
            type: string
            example: "jpg"
          temporary_url:
            description: "前職源泉徴収票<br>ファイルURL"
            type: string
            example: "https://example.com/file.jpg"
      curriculum_vitae:
        type: object
        properties:
          name:
            description: "職務経歴書<br>ファイル名"
            type: string
            example: "職務経歴書.jpg"
          extension:
            description: "職務経歴書<br>ファイル拡張子"
            type: string
            example: "jpg"
          temporary_url:
            description: "職務経歴書<br>ファイルURL"
            type: string
            example: "https://example.com/file.jpg"
  experiences:
    type: array
    items:
      type: object
      properties:
        id:
          description: "職歴ID"
          type: string
          example: "1"
        joined_on:
          description: "入社年月"
          type: string
          format: date
          pattern: "yyyy-MM-dd"
          example: "2024-04-13"
        retired_on:
          description: "退職年月"
          type: string
          format: date
          pattern: "yyyy-MM-dd"
          example: "2024-04-13"
        service_period:
          description: "勤続期間"
          type: string
          example: "5年3カ月"
        company_name:
          description: "会社名"
          type: string
          example: "Jinjer株式会社"
        postcode:
          description: "郵便番号"
          type: string
          example: "060-0001"
        address:
          description: "住所"
          type: string
          example: "北海道札幌市中央区北１条西２丁目"
        retirement_classification:
          type: object
          properties:
            id:
              description: "退職区分ID<br>人事設定＞基本情報＞退職区分にて登録されているマスタのIDが出力されます。"
              type: string
              example: "2"
            name:
              description: "退職区分"
              type: string
              example: "自己都合退職"
        retirement_reason_details:
          description: "退職理由詳細"
          type: string
          example: "◯◯という理由です。"
        industry:
          type: object
          properties:
            id:
              description: "業種ID<br>人事設定＞職歴＞業種にて登録されているマスタのIDが出力されます。"
              type: string
              example: "1"
            name:
              description: "業種"
              type: string
              example: "林業"
        domestic:
          type: object
          properties:
            id:
              description: "国内外区分ID (1:国内, 2:国外)"
              type: string
              example: "1"
            name:
              description: "国内外区分"
              type: string
              example: "国内"
        dept_name:
          description: "所属部門"
          type: string
          example: "第一営業部"
        job_category:
          description: "職種"
          type: string
          example: "企画職"
        position:
          description: "役職"
          type: string
          example: "部長"
        created_at:
          description: "作成日時"
          type: string
          format: datetime
          pattern: "yyyy-MM-dd hh:mm:ss"
          example: "2024-04-13 12:34:56"
        updated_at:
          description: "更新日時"
          type: string
          format: datetime
          pattern: "yyyy-MM-dd hh:mm:ss"
          example: "2024-04-13 12:34:56"
