type: object
required:
  - employee_id
properties:
  employee_id:
    type: string
    minLength: 1
    maxLength: 50
    example: "JIN0001"
    description: "社員番号"
  absences:
    type: object
    required:
      - start_date
    properties:
      absence_classification:
        type: object
        properties:
          id:
            type: string
            minLength: 0
            maxLength: 20
            example: "1"
            description: "休職区分ID<br>人事設定＞休職＞休職区分にて登録されているマスタのIDが設定可能です。"
      start_date:
        type: string
        minLength: 10
        maxLength: 10
        format: date
        pattern: yyyy-MM-dd
        example: "2024-04-13"
        description: "休職開始年月日"
      expected_end_date:
        type: string
        minLength: 0
        maxLength: 10
        format: date
        pattern: yyyy-MM-dd
        example: "2024-04-13"
        description: "休職終了予定年月日"
      end_date:
        type: string
        minLength: 0
        maxLength: 10
        format: date
        pattern: yyyy-MM-dd
        example: "2024-04-13"
        description: "休職終了年月日"
      reason:
        type: string
        minLength: 0
        maxLength: 255
        example: "1"
        description: "休職理由詳細"
      payment_classification:
        type: object
        properties:
          id:
            type: string
            minLength: 0
            maxLength: 1
            example: "1"
            description: "休職支給区分ID<br>0:未選択<br>1:支給する<br>2:支給しない"
      remarks:
        type: string
        minLength: 0
        maxLength: 255
        example: "◯◯という備考です。"
        description: "備考"
