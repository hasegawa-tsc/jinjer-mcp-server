type: object
required:
  - employee_id
properties:
  employee_id:
    type: string
    minLength: 1
    maxLength: 50
    example: "JIN0001"
    description: "社員番号"
  dependents:
    type: object
    required:
      - last_name
      - first_name
    properties:
      last_name:
        type: string
        minLength: 1
        maxLength: 50
        example: "神社"
        description: "氏"
      first_name:
        type: string
        minLength: 1
        maxLength: 50
        example: "一郎"
        description: "名"
      last_name_phonetic:
        type: string
        minLength: 0
        maxLength: 50
        example: "ジンジャ"
        description: "氏（フリガナ）"
      first_name_phonetic:
        type: string
        minLength: 0
        maxLength: 50
        example: "イチロウ"
        description: "名（フリガナ）"
      relationship:
        type: object
        properties:
          id:
            type: number
            minLength: 0
            maxLength: 10
            example: 1
            description: "続柄ID<br>人事設定＞家族＞続柄にて登録されているマスタのIDが設定可能です。"
      gender:
        type: object
        properties:
          id:
            type: number
            minLength: 0
            maxLength: 1
            example: 1
            description: "性別ID<br>0:未選択<br>1:男<br>2:女"
      date_of_birth:
        type: string
        minLength: 0
        maxLength: 10
        format: date
        pattern: yyyy-MM-dd
        example: "2024-04-13"
        description: "生年月日"
      occupation:
        type: string
        minLength: 0
        maxLength: 255
        example: ""
        description: "職業"
      zip_code:
        type: string
        minLength: 0
        maxLength: 8
        example: "060-0001"
        description: "郵便番号"
      address_phonetic:
        type: string
        minLength: 0
        maxLength: 255
        example: "ホッカイドウサッポロシチュウオウクキタイチジョウニシニチョウメ"
        description: "住所（フリガナ）"
      national_local_government_code:
        type: string
        minLength: 0
        maxLength: 6
        example: "011011"
        description: "全国地方公共団体コード"
      street:
        type: string
        minLength: 0
        maxLength: 255
        example: "北１条西２丁目"
        description: "丁目・番地"
      building:
        type: string
        minLength: 0
        maxLength: 255
        example: "札幌ビル"
        description: "建物名・部屋番号"
      phone_number_classification:
        type: object
        properties:
          id:
            type: number
            minLength: 0
            maxLength: 1
            example: 1
            description: "電話番号区分ID<br>1:自宅<br>2:携帯<br>3:勤務先<br>4:その他"
      tel:
        type: string
        minLength: 0
        maxLength: 11
        example: "03-5908-8291"
        description: "電話番号"
      company_dependent_classification:
        type: object
        properties:
          id:
            type: number
            minLength: 0
            maxLength: 1
            example: 1
            description: "社保扶養区分ID<br>0:未選択<br>1:扶養対象<br>2:扶養対象外"
      health_insurance_dependent_classification:
        type: object
        properties:
          id:
            type: number
            minLength: 0
            maxLength: 1
            example: 1
            description: "健保扶養区分ID<br>0:未選択<br>1:加入<br>2:未加入"
      health_insurance_dependent:
        type: object
        properties:
          acquired_on:
            type: string
            minLength: 0
            maxLength: 10
            format: date
            pattern: yyyy-MM-dd
            example: "2024-04-13"
            description: "健保扶養加入日"
          disacquired_on:
            type: string
            minLength: 0
            maxLength: 10
            format: date
            pattern: yyyy-MM-dd
            example: "2024-04-13"
            description: "健保扶養資格喪失日"
      cohabitation_classification:
        type: object
        properties:
          id:
            type: number
            minLength: 0
            maxLength: 1
            example: 1
            description: "同居区分ID<br>1:同居<br>2:別居"
      resident_classification:
        type: object
        properties:
          id:
            type: number
            minLength: 0
            maxLength: 1
            example: 1
            description: "居住者区分ID<br>1:居住者<br>2:非居住者"
      overseas_student_classification:
        type: object
        properties:
          id:
            type: number
            minLength: 0
            maxLength: 1
            example: 1
            description: "留学生区分ID<br>0:対象外<br>1:対象"
      remittance_classification:
        type: object
        properties:
          id:
            type: number
            minLength: 0
            maxLength: 1
            example: 1
            description: "38万円以上の送金対象区分ID<br>0:対象外<br>1:対象"
      disability_classification:
        type: object
        properties:
          id:
            type: number
            minLength: 0
            maxLength: 1
            example: 1
            description: "障害者区分ID<br>1:対象外<br>2:一般障害者<br>3:特別障害者"
      disability_identification:
        type: object
        properties:
          classification:
            type: object
            properties:
              id:
                type: string
                minLength: 0
                maxLength: 1
                example: "1"
                description: "障害者手帳区分ID<br>0:未選択<br>1:身体障害者手帳<br>2:療育手帳<br>3:精神障害者保健福祉手帳<br>4:戦傷病者手帳"
          date_of_disability_certification:
            type: string
            minLength: 0
            maxLength: 10
            format: date
            pattern: yyyy-MM-dd
            example: "2024-04-13"
            description: "障害者手帳交付年月日"
      dependent_start:
        type: string
        minLength: 0
        maxLength: 10
        format: date
        pattern: yyyy-MM-dd
        example: "2024-04-13"
        description: "税扶養開始日"
      dependent_end:
        type: string
        minLength: 0
        maxLength: 10
        format: date
        pattern: yyyy-MM-dd
        example: "2024-04-13"
        description: "税扶養終了日"
      date_of_decease:
        type: string
        minLength: 0
        maxLength: 10
        format: date
        pattern: yyyy-MM-dd
        example: "2024-04-13"
        description: "死亡年月日"
      source_deduction_object:
        type: object
        properties:
          id:
            type: number
            minLength: 0
            maxLength: 1
            example: 1
            description: "源泉控除対象配偶者ID<br>0:対象外<br>1:対象"
      spousal_pension_number_first:
        type: string
        minLength: 0
        maxLength: 4
        example: "1234"
        description: "配偶者基礎年金番号（前4桁）"
      spousal_pension_number_last:
        type: string
        minLength: 0
        maxLength: 6
        example: "567890"
        description: "配偶者基礎年金番号（後6桁）"
      income:
        type: number
        minLength: 0
        maxLength: 9
        example: 1234567
        description: "収入(年収)"
      expected_income:
        type: string
        minLength: 0
        maxLength: 255
        example: "1234567"
        description: "所得見込額"
      remarks:
        type: string
        minLength: 0
        maxLength: 255
        example: "◯◯という備考です。"
        description: "備考"
