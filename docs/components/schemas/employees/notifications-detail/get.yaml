    type: array
    items:
      type: object
      properties:
        notified_at:
          type: string
          format: datetime
          pattern: yyyy-MM-dd hh:mm:ss
          example: "2024-04-13 12:34:56"
          description: "ワークフロー通知 発生時刻"
        notified_for:
          type: string
          example: "1"
          description: "ワークフロー通知 通知種別ID<br>1:承認依頼<br>2:承認<br>3:否認<br>4:差し戻し<br>5:取下げ<br>6:回覧依頼"
        request:
          type: object
          properties:
            id:
              type: string
              example: "JN0000000001AA"
              description: "ワークフロー通知 申請書No."
            request_form:
              type: object
              properties:
                id:
                  type: string
                  example: "1"
                  description: "ワークフロー通知 申請フォームID"
                name:
                  type: string
                  example: "入社申請"
                  description: "ワークフロー通知 申請フォーム名"
