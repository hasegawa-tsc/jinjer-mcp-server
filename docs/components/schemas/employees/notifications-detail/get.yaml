              type: object
              properties:
                id:
                  type: string
                  example: "JIN0001"
                  description: "ワークフロー通知 申請者 社員番号"
                last_name:
                  type: string
                  example: "神社"
                  description: "ワークフロー通知 申請者 職場氏名（氏）"
                first_name:
                  type: string
                  example: "一郎"
                  description: "ワークフロー通知 申請者 職場氏名（名）"
        content:
          type: string
          example: "入社申請の承認依頼があります。"
          description: "ワークフロー通知 内容"
        is_read:
          type: boolean
          example: true
          description: "ワークフロー通知 状態<br>true:既読<br>false:未読"
        created_at:
          type: string
          format: datetime
          pattern: yyyy-MM-dd hh:mm:ss
