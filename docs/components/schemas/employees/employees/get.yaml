type: object
properties:
  id:
    type: string
    example: "JIN0001"
    description: "社員番号"
  company:
    type: object
    properties:
      last_name:
        type: string
        example: "神社"
        description: "職場氏名（氏）"
      first_name:
        type: string
        example: "一郎"
        description: "職場氏名（名）"
      last_name_phonetic:
        type: string
        example: "ジンジャ"
        description: "職場氏名（氏）（フリガナ）"
      first_name_phonetic:
        type: string
        example: "イチロウ"
        description: "職場氏名（名）（フリガナ）"
      joined_on:
        type: string
        format: date
        pattern: yyyy-MM-dd
        example: "2024-04-13"
        description: "入社年月日"
      mobile_number:
        type: string
        example: "090-0000-0000"
        description: "携帯電話番号（社用）"
      email:
        type: string
        example: "jinjer_customer@jinjer.co.jp"
        description: "E-Mail（社用）"
      fax_number:
        type: string
        example: "03-5908-8291"
        description: "FAX番号（社用）"
      ext_number:
        type: string
        example: "1001"
        description: "内線番号"
      enrollment_classification:
        type: object
        properties:
          id:
            type: string
            example: "1"
            description: "在籍区分ID<br>0:在籍<br>1:退職<br>2:休職"
          name:
            type: string
            example: "退職"
            description: "在籍区分"
      employment_classification:
        type: object
        properties:
          id:
            type: string
            example: "1"
            description: "雇用区分ID<br>人事設定＞基本情報＞雇用区分にて登録されているマスタのIDが出力されます。"
          name:
            type: string
            example: "正社員"
            description: "雇用区分"
      permission_to_transfer:
        type: object
        properties:
          id:
            type: string
            example: "1"
            description: "転勤可否ID<br>人事設定＞基本情報＞転勤可否にて登録されているマスタのIDが出力されます。"
          name:
            type: string
            example: "転勤可"
            description: "転勤可否"
      solo_transfer_classification:
        type: object
        properties:
          id:
            type: string
            example: "1"
            description: "単身赴任区分ID<br>人事設定＞基本情報＞単身赴任区分にて登録されているマスタのIDが出力されます。"
          name:
            type: string
            example: "可"
            description: "単身赴任区分"
      retirement_date:
        type: string
        format: date
        pattern: yyyy-MM-dd
        example: "2024-04-13"
        description: "退職年月日"
      retirement_payment_classification:
        type: object
        properties:
          id:
            type: string
            example: "1"
            description: "退職支給区分ID<br>1:支給する<br>2:支給しない"
          name:
            type: string
            example: "支給する"
            description: "退職支給区分"
      retirement_classification:
        type: object
        properties:
          id:
            type: string
            example: "1"
            description: "退職区分ID<br>人事設定＞基本情報＞退職区分にて登録されているマスタのIDが出力されます。"
          name:
            type: string
            example: "自己都合退職"
            description: "退職区分"
      retirement_reason:
        type: object
        properties:
          id:
            type: string
            example: "1"
            description: "退職理由ID<br>人事設定＞基本情報＞退職理由にて登録されているマスタのIDが出力されます。"
          name:
            type: string
            example: "転職"
            description: "退職理由"
          details:
            type: string
            example: "◯◯という理由です。"
            description: "退職理由詳細"
