type: object
required:
  - employee_id
properties:
  employee_id:
    type: string
    minLength: 1
    maxLength: 50
    example: "JIN0001"
    description: "社員番号"
  affiliations:
    type: object
    required:
      - date_of_issue
    properties:
      date_of_issue:
        type: string
        minLength: 10
        maxLength: 10
        format: date
        pattern: yyyy-MM-dd
        example: "2024-04-13"
        description: "主務 発令年月日"
      change_classification:
        type: object
        properties:
          id:
            type: string
            minLength: 0
            maxLength: 10
            example: "1"
            description: "主務 異動区分ID<br>人事設定＞所属＞異動区分にて登録されているマスタのIDが設定可能です。"
      department:
        type: object
        properties:
          id:
            type: string
            minLength: 0
            maxLength: 50
            example: "1"
            description: "主務 所属グループID"
      employee_post:
        type: object
        properties:
          id:
            type: string
            minLength: 0
            maxLength: 10
            example: "1"
            description: "主務 役職ID<br>人事設定＞所属＞役職にて登録されているマスタのIDが設定可能です。"
      work_location:
        type: object
        properties:
          id:
            type: string
            minLength: 0
            maxLength: 10
            example: "1"
            description: "主務 勤務地ID<br>人事設定＞所属＞勤務地にて登録されているマスタのIDが設定可能です。"
      job_classification:
        type: object
        properties:
          id:
            type: string
            minLength: 0
            maxLength: 10
            example: "1"
            description: "主務 職種ID<br>人事設定＞所属＞職種にて登録されているマスタのIDが設定可能です。"
      duty_classification:
        type: object
        properties:
          id:
            type: string
            minLength: 0
            maxLength: 10
            example: "1"
            description: "主務 職務ID<br>人事設定＞所属＞職務にて登録されているマスタのIDが設定可能です。"
      employee_grade:
        type: object
        properties:
          id:
            type: string
            minLength: 0
            maxLength: 10
            example: "1"
            description: "主務 グレードID<br>人事設定＞給与計算＞グレードにて登録されているグレードが設定可能です。<br>グレードは `GET /v1/master/employee-grades` で得られる `id` の値（グレードID）で指定します。"
      boss:
        type: object
        properties:
          employee_id:
            type: string
            minLength: 0
            maxLength: 50
            example: "JIN0002"
            description: "主務 上司 社員番号"
      optional_classifications:
        type: array
        items:
          type: object
          properties:
            number:
              type: number
              minLength: 0
              maxLength: 1
              example: 1
              description: "主務 任意項目番号<br>任意項目の1-3に対応します。"
            id:
              type: string
              minLength: 0
              maxLength: 10
              example: "1"
              description: "主務 任意項目ID<br>人事設定＞所属＞任意項目1~3にて登録されているマスタのIDが設定可能です。"
      roles:
        type: object
        properties:
          jinji:
            type: object
            properties:
              id:
                type: string
                minLength: 0
                maxLength: 10
                example: "1"
                description: "主務 ロール（人事）ID"
          payroll:
            type: object
            properties:
              id:
                type: string
                minLength: 0
                maxLength: 10
                example: "1"
                description: "主務 ロール（給与）ID<br>ご利用にはジンジャー給与の契約が必要です。"
          labor:
            type: object
            properties:
              id:
                type: string
                minLength: 0
                maxLength: 10
                example: "1"
                description: "主務 ロール（労務）ID<br>ご利用には社保手続きオプションの契約が必要です。"
          expenses:
            type: object
            properties:
              id:
                type: string
                minLength: 0
                maxLength: 10
                example: "1"
                description: "主務 ロール（経費）ID<br>ご利用にはジンジャー経費の契約が必要です。"
          survey:
            type: object
            properties:
              id:
                type: string
                minLength: 0
                maxLength: 10
                example: "1"
                description: "主務 ロール（ワーク・バイタル）ID<br>ご利用にはワーク・バイタルのオプションの契約が必要です。"
          mynumber:
            type: object
            properties:
              id:
                type: string
                minLength: 0
                maxLength: 10
                example: "1"
                description: "主務 ロール（マイナンバー）ID<br>ご利用にはマイナンバーオプションの契約が必要です。"
          workflow:
            type: object
            properties:
              id:
                type: string
                minLength: 0
                maxLength: 10
                example: "1"
                description: "主務 ロール（ワークフロー）ID<br>ご利用にはジンジャーワークフローの契約が必要です。"
          sign:
            type: object
            properties:
              id:
                type: string
                minLength: 0
                maxLength: 10
                example: "1"
                description: "主務 ロール（サイン）ID<br>ご利用にはジンジャーサインの契約が必要です。"
          hr_data_analysis:
            type: object
            properties:
              id:
                type: string
                minLength: 0
                maxLength: 10
                example: "1"
                description: "主務 ロール（人事データ分析）ID<br>ご利用にはジンジャー人事データ分析の契約が必要です。"
          organizational_survey:
            type: object
            properties:
              id:
                type: string
                minLength: 0
                maxLength: 10
                example: "1"
                description: "主務 ロール（サーベイ）ID<br>ご利用にはジンジャーサーベイの契約が必要です。"
          attendance_group:
            type: object
            properties:
              id:
                type: string
                minLength: 0
                maxLength: 10
                example: "1"
                description: "主務 ロール（メイン打刻グループ）ID<br>「主務 メイン打刻グループ」を指定する場合、指定は必須です。"
          sub_attendance_groups:
            type: array
            items:
              type: object
              properties:
                id:
                  type: string
                  minLength: 0
                  maxLength: 10
                  example: "1"
                  description: "主務 ロール（サブ打刻グループ）ID<br>「主務 サブ打刻グループ」を指定する場合、指定は必須かつ配列の長さが一致する必要があります。"
      attendance_group:
        type: object
        properties:
          id:
            type: string
            minLength: 0
            maxLength: 10
            example: "1"
            description: "主務 メイン打刻グループID<br>「主務 ロール（メイン打刻グループ）」を指定する場合、指定は必須です。"
      sub_attendance_groups:
        type: array
        items:
          type: object
          properties:
            id:
              type: string
              minLength: 0
              maxLength: 10
              example: "1"
              description: "主務 サブ打刻グループID<br>「主務 ロール（サブ打刻グループ）」を指定する場合、指定は必須かつ配列の長さが一致する必要があります。"
