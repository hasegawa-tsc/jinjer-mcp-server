type: object
properties:
  employee_id:
    type: string
    example: "JIN0001"
    description: "社員番号"
  emergency_contacts:
    type: array
    items:
      type: object
      properties:
        id:
          type: string
          example: "1"
          description: "緊急連絡先ID<br>従業員管理＞基本情報＞緊急連絡先で表示されるNo.（連番）です。"
        last_name_phonetic:
          type: string
          example: "ジンジャ"
          description: "緊急連絡先 氏（フリガナ）"
        last_name:
          type: string
          example: "神社"
          description: "緊急連絡先 氏"
        first_name_phonetic:
          type: string
          example: "ハナコ"
          description: "緊急連絡先 名（フリガナ）"
        first_name:
          type: string
          example: "花子"
          description: "緊急連絡先 名"
        phone_number:
          type: string
          example: "090-0000-0000"
          description: "緊急連絡先 電話番号"
        relationship:
          type: object
          properties:
            id:
              type: string
              example: "1"
              description: "緊急連絡先 続柄ID<br>人事設定＞家族＞続柄にて登録されているマスタのIDが出力されます。"
            name:
              type: string
              example: "妻"
              description: "緊急連絡先 続柄"
        zip_code:
          type: string
          example: "060-0001"
          description: "緊急連絡先 郵便番号"
        address_phonetic:
          type: string
          example: "ホッカイドウサッポロシチュウオウクキタイチジョウニシニチョウメ"
          description: "緊急連絡先 住所（フリガナ）"
        national_local_government_code:
          type: string
          example: "011011"
          description: "緊急連絡先  都道府県/市区町村<br>全国地方公共団体コードを出力します。"
        prefecture:
          type: object
          properties:
            id:
              type: string
              example: "1"
              description: "緊急連絡先 都道府県ID"
            name:
              type: string
              example: "北海道"
              description: "緊急連絡先 都道府県"
        municipality:
          type: object
          properties:
            id:
              type: string
              example: "101"
              description: "緊急連絡先 市区町村ID"
            name:
              type: string
              example: "札幌市中央区"
              description: "緊急連絡先 市区町村"
        street:
          type: string
          example: "北１条西２丁目"
          description: "緊急連絡先 丁目･番地"
        building:
          type: string
          example: "札幌ビル"
          description: "緊急連絡先 建物名"
        email:
          type: string
          example: "jinjer_customer@jinjer.co.jp"
          description: "緊急連絡先 E-mail"
        created_at:
          type: string
          format: datetime
          pattern: yyyy-MM-dd hh:mm:ss
          example: "2024-04-13 12:34:56"
          description: "作成日時"
        updated_at:
          type: string
          format: datetime
          pattern: yyyy-MM-dd hh:mm:ss
          example: "2024-04-13 12:34:56"
          description: "更新日時"
