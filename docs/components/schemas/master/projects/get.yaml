type: object
properties:
  id:
    type: string
    example: "1"
    description: "プロジェクトID<br>マスタにて任意に登録されるIDです。"
  name:
    type: string
    example: "人的資本経営PJ"
    description: "プロジェクト名"
  started_on:
    type: string
    format: date
    pattern: yyyy-MM-dd
    example: "2024-04-13"
    description: "開始日"
  ended_on:
    type: string
    format: date
    pattern: yyyy-MM-dd
    example: "2024-04-13"
    description: "終了日"
  category:
    type: object
    properties:
      id:
        type: string
        example: "1"
        description: "カテゴリID"
      name:
        type: string
        example: "経営"
        description: "カテゴリ名"
  remarks:
    type: string
    example: "◯◯という備考です。"
    description: "説明"
  active:
    type: boolean
    example: true
    description: "有効ステータス"
  display_order:
    type: number
    example: 2
    description: "表示順"
  access_control:
    type: object
    properties:
      public_classification:
        type: string
        example: "1"
        description: "公開範囲<br>1:全体公開<br>2:限定公開"
      employees:
        type: array
        items:
          type: object
          properties:
            id:
              type: string
              example: "JIN0001"
              description: "公開範囲 社員番号"
      accounting_departments:
        type: array
        items:
          type: object
          properties:
            id:
              type: string
              example: "1"
              description: "公開範囲 計上部門ID"
      depts_and_posts:
        type: array
        items:
          type: object
          properties:
            id:
              type: string
              example: "1234567"
              description: "公開範囲 所属グループ・役職行ID<br>システム上で自動で発番される一意のIDです。"
            applies_to_all_lower_depts:
              type: boolean
              example: true
              description: "公開範囲 下位所属グループへの適用<br>true:適用する<br>false:適用しない"
            departments:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                    example: "1"
                    description: "公開範囲 所属グループID"
            employee_posts:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                    example: "1"
                    description: "公開範囲 役職ID"
  created_at:
    type: string
    format: datetime
    pattern: yyyy-MM-dd hh:mm:ss
    example: "2024-04-13 12:34:56"
    description: "作成日時"
  updated_at:
    type: string
    format: datetime
    pattern: yyyy-MM-dd hh:mm:ss
    example: "2024-04-13 12:34:56"
    description: "更新日時"
