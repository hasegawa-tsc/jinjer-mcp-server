type: object
properties:
  id:
    type: string
    example: "1"
    description: "採用経路ID<br>マスタにて任意に登録されるIDです。"
  name:
    type: string
    example: "ナビ媒体"
    description: "採用経路名"
  active:
    type: boolean
    example: true
    description: "有効ステータス"
  is_default:
    type: boolean
    example: true
    description: "既定値フラグ<br>true の場合、ID を変更できません。"
  created_at:
    type: string
    format: datetime
    pattern: yyyy-MM-dd hh:mm:ss
    example: "2024-04-13 12:34:56"
    description: "作成日時"
  updated_at:
    type: string
    format: datetime
    pattern: yyyy-MM-dd hh:mm:ss
    example: "2024-04-13 12:34:56"
    description: "更新日時"
