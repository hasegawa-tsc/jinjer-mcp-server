type: object
properties:
  id:
    type: string
    example: "1"
    description: "カテゴリID<br>マスタにて任意に登録されるIDです。"
  name:
    type: string
    example: "経営"
    description: "カテゴリ名"
  display_order:
    type: number
    example: 2
    description: "表示順"
  created_at:
    type: string
    format: datetime
    pattern: yyyy-MM-dd hh:mm:ss
    example: "2024-04-13 12:34:56"
    description: "作成日時"
  updated_at:
    type: string
    format: datetime
    pattern: yyyy-MM-dd hh:mm:ss
    example: "2024-04-13 12:34:56"
    description: "更新日時"
