type: object
properties:
  id:
    type: string
    example: "1234567"
    description: "出力フォーマットID<br>システム上で自動で発番される一意のIDです。"
  name:
    type: string
    example: "ジンジャー会計フォーマット"
    description: "出力フォーマット名"
  with_header:
    type: boolean
    example: true
    description: "出力項目名の出力<br>true:ヘッダ行を出力する<br>false:ヘッダ行を出力しない"
  aggregates:
    type: boolean
    example: true
    description: "集計設定の利用<br>true:利用する<br>false:利用しない"
  active:
    type: boolean
    example: true
    description: "有効ステータス"
  is_default:
    type: boolean
    example: true
    description: "既定のフォーマット<br>既定のフォーマットの場合 true を返します。"
  created_at:
    type: string
    format: datetime
    pattern: yyyy-MM-dd hh:mm:ss
    example: "2024-04-13 12:34:56"
    description: "作成日時"
  updated_at:
    type: string
    format: datetime
    pattern: yyyy-MM-dd hh:mm:ss
    example: "2024-04-13 12:34:56"
    description: "更新日時"
