type: object
properties:
  id:
    type: string
    example: "1"
    description: "保険者ID<br>システム上で自動で発番される一意のIDです。"
  name:
    type: string
    example: "関東ＩＴソフトウェア健康保険組合"
    description: "保険者名"
  extension_code:
    type: string
    example: "0009283700$$健保$$関東ＩＴソフトウェア健康保険組合"
    description: "保険者拡張コード"
  created_at:
    type: string
    format: datetime
    pattern: yyyy-MM-dd hh:mm:ss
    example: "2024-04-13 12:34:56"
    description: "作成日時"
  updated_at:
    type: string
    format: datetime
    pattern: yyyy-MM-dd hh:mm:ss
    example: "2024-04-13 12:34:56"
    description: "更新日時"
