type: object
properties:
  id:
    type: string
    example: "1"
    description: "カスタム項目ID"
  name:
    type: string
    example: "カスタム項目(羅列)"
    description: "カスタム項目名<br>項目名は項目カスタマイズ＞項目一覧画面にて設定可能です。"
  type:
    type: object
    properties:
      id:
        type: number
        example: 2
        description: "カスタム項目 レイアウトID<br>0:項目羅列<br>1:項目追加（横）"
      name:
        type: string
        example: "項目追加（横）"
        description: "カスタム項目 レイアウト"
  customize_item:
    type: array
    items:
      type: object
      properties:
        id:
          type: string
          example: "1"
          description: "項目羅列の項目ID/項目追加の項目ID"
        name:
          type: string
          example: "プルダウン項目"
          description: "項目羅列の項目名/項目追加の項目名"
        details:
          type: string
          example: "◯◯という備考です。"
          description: "説明"
        type:
          type: object
          properties:
            id:
              type: string
              example: "2"
              description: "入力形式ID<br>1:テキストフォーム<br>2:カレンダー<br>3:ファイル<br>4:プルダウン<br>5:ラジオボタン<br>6:チェックボックス<br>7:ロングテキストエリア<br>8:URL"
            name:
              type: string
              example: "テキストフォーム"
              description: "入力形式"
        restriction:
          type: object
          properties:
            id:
              type: string
              example: "2"
              description: "入力制限ID<br>0:未設定<br>1:全角かな<br>2:全角カナ<br>3:全角数字<br>4:全角英数字記号<br>5:半角数字<br>6:半角英数字記号<br>7:数値(マイナスと小数点含む)"
            name:
              type: string
              example: "全角カナ"
              description: "入力制限"
        max_length:
          type: number
          example: 2
          description: "文字数制限<br>入力形式がテキストフォーム、ロングテキストエリアの場合のみ出力されます。"
        unit:
          type: string
          example: "km"
          description: "単位<br>入力形式がテキストフォーム、ロングテキストエリアの場合のみ出力されます。"
        options:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                example: "1"
                description: "選択肢ID<br>入力形式がプルダウン、ラジオボタン、チェックボックスの場合のみ出力されます。"
              name:
                type: string
                example: "選択肢1"
                description: "選択肢名<br>入力形式がプルダウン、ラジオボタン、チェックボックスの場合のみ設定可能です。"
        created_at:
          type: string
          format: datetime
          pattern: yyyy-MM-dd hh:mm:ss
          example: "2024-04-13 12:34:56"
          description: "作成日時"
        updated_at:
          type: string
          format: datetime
          pattern: yyyy-MM-dd hh:mm:ss
          example: "2024-04-13 12:34:56"
          description: "更新日時"
  created_at:
    type: string
    format: datetime
    pattern: yyyy-MM-dd hh:mm:ss
    example: "2024-04-13 12:34:56"
    description: "作成日時"
  updated_at:
    type: string
    format: datetime
    pattern: yyyy-MM-dd hh:mm:ss
    example: "2024-04-13 12:34:56"
    description: "更新日時"
