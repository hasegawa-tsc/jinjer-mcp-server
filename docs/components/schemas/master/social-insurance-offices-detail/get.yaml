                id:
                  description: "電子申請用情報 市区町村ID"
                  type: string
                  example: "101"
                name:
                  description: "電子申請用情報 市区町村"
                  type: string
                  example: "札幌市中央区"
            street_and_building:
              description: "電子申請用情報 丁目・番地・建物名・ 部屋番号"
              type: string
              example: "北１条西２丁目"
        health_insurance_overall:
          type: object
          properties:
            rate:
              description: "健保料率給与全体 料率"
              type: string
              example: "1.1000"
