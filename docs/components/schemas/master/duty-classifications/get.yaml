type: object
properties:
  id:
    type: string
    example: "1"
    description: "職務ID<br>マスタにて任意に登録されるIDです。"
  name:
    type: string
    example: "商品企画"
    description: "職務名"
  active:
    type: boolean
    example: true
    description: "有効ステータス"
  created_at:
    type: string
    format: datetime
    pattern: yyyy-MM-dd hh:mm:ss
    example: "2024-04-13 12:34:56"
    description: "作成日時"
  updated_at:
    type: string
    format: datetime
    pattern: yyyy-MM-dd hh:mm:ss
    example: "2024-04-13 12:34:56"
    description: "更新日時"
