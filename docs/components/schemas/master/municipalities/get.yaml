type: object
properties:
  national_local_government_code:
    type: string
    example: "011011"
    description: "市区町村コード<br>JISで規定された全国地方公共団体コードです。"
  prefecture:
    type: object
    properties:
      id:
        type: string
        example: "1"
        description: "都道府県ID<br>システム上で自動で発番される一意のIDです。"
      name:
        type: string
        example: "北海道"
        description: "都道府県名"
      name_phonetic:
        type: string
        example: "ホッカイドウ"
        description: "都道府県名（フリガナ）"
  municipality:
    type: object
    properties:
      id:
        type: string
        example: "101"
        description: "市区町村ID<br>システム上で自動で発番される一意のIDです。"
      name:
        type: string
        example: "札幌市中央区"
        description: "市区町村名"
      name_phonetic:
        type: string
        example: "サッポロシチュウオウク"
        description: "市区町村名（フリガナ）"
  created_at:
    type: string
    format: datetime
    pattern: yyyy-MM-dd hh:mm:ss
    example: "2024-04-13 12:34:56"
    description: "作成日時"
  updated_at:
    type: string
    format: datetime
    pattern: yyyy-MM-dd hh:mm:ss
    example: "2024-04-13 12:34:56"
    description: "更新日時"
