type: object
properties:
  id:
    type: string
    example: "1"
    description: "計上部門ID"
  name:
    type: string
    example: "第一営業部"
    description: "計上部門名"
  abbreviation:
    type: string
    example: "一営"
    description: "計上部門名（略称）"
  display_order:
    type: number
    example: 2
    description: "表示順"
  apportionable:
    type: boolean
    example: true
    description: "按分可否<br>true の場合、按分先として選択が可能です。<br>false の場合、按分先として選択できません。"
  active:
    type: boolean
    example: true
    description: "有効ステータス"
  created_at:
    type: string
    format: datetime
    pattern: yyyy-MM-dd hh:mm:ss
    example: "2024-04-13 12:34:56"
    description: "作成日時"
  updated_at:
    type: string
    format: datetime
    pattern: yyyy-MM-dd hh:mm:ss
    example: "2024-04-13 12:34:56"
    description: "更新日時"
