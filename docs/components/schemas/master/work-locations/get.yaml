type: object
properties:
  id:
    type: string
    example: "1"
    description: "勤務地ID<br>マスタにて任意に登録されるIDです。"
  name:
    type: string
    example: "本社"
    description: "勤務地名"
  active:
    type: boolean
    example: true
    description: "有効ステータス"
  is_default:
    type: boolean
    example: true
    description: "既定値フラグ<br>true の場合、ID を変更できません。"
  domestic:
    type: boolean
    example: true
    description: "国内フラグ<br>true の場合、国内の勤務地を表します。<br>false の場合、海外の勤務地を表します。"
  created_at:
    type: string
    format: datetime
    pattern: yyyy-MM-dd hh:mm:ss
    example: "2024-04-13 12:34:56"
    description: "作成日時"
  updated_at:
    type: string
    format: datetime
    pattern: yyyy-MM-dd hh:mm:ss
    example: "2024-04-13 12:34:56"
    description: "更新日時"
