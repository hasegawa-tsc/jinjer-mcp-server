type: object
properties:
  id:
    type: string
    example: "1"
    description: "労災業種ID<br>システム上で自動で発番される一意のIDです。"
  name:
    type: string
    example: "林業"
    description: "労災業種名"
  insurance_rate:
    type: string
    example: "2"
    description: "労災保険率"
  created_at:
    type: string
    format: datetime
    pattern: yyyy-MM-dd hh:mm:ss
    example: "2024-04-13 12:34:56"
    description: "作成日時"
  updated_at:
    type: string
    format: datetime
    pattern: yyyy-MM-dd hh:mm:ss
    example: "2024-04-13 12:34:56"
    description: "更新日時"
