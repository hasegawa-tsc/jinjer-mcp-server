type: object
properties:
  id:
    type: string
    example: "1"
    description: "半休設定ID"
  name:
    type: string
    example: "通常半休"
    description: "半休設定名"
  display_order:
    type: number
    example: 2
    description: "表示順"
  first_half:
    type: object
    properties:
      name:
        type: string
        example: "午前休"
        description: "前休 名称"
      rate:
        type: number
        example: 0.5
        description: "前休 消化日数"
      start:
        type: string
        format: time
        pattern: hh:mm
        example: "12:34"
        description: "前休 開始時刻"
      end:
        type: string
        format: time
        pattern: hh:mm
        example: "12:34"
        description: "前休 終了時刻"
  second_half:
    type: object
    properties:
      name:
        type: string
        example: "午後休"
        description: "後休 名称"
      rate:
        type: number
        example: 0.5
        description: "後休 消化日数"
      start:
        type: string
        format: time
        pattern: hh:mm
        example: "12:34"
        description: "後休 開始時刻"
      end:
        type: string
        format: time
        pattern: hh:mm
        example: "12:34"
        description: "後休 終了時刻"
  created_at:
    type: string
    format: datetime
    pattern: yyyy-MM-dd hh:mm:ss
    example: "2024-04-13 12:34:56"
    description: "作成日時"
  updated_at:
    type: string
    format: datetime
    pattern: yyyy-MM-dd hh:mm:ss
    example: "2024-04-13 12:34:56"
    description: "更新日時"
