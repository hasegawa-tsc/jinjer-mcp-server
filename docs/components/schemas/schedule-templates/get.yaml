type: object
properties:
  id:
    type: string
    example: "1"
    description: "スケジュール雛形ID"
  name:
    type: string
    example: "通常日勤スケジュール"
    description: "スケジュール雛形名"
  abbreviation:
    type: string
    example: "通常"
    description: "スケジュール雛形略称"
  display_order:
    type: number
    example: 2
    description: "表示順"
  work_schedule:
    type: object
    properties:
      start:
        type: string
        format: time
        pattern: hh:mm
        example: "12:34"
        description: "出勤時刻"
      end:
        type: string
        format: time
        pattern: hh:mm
        example: "12:34"
        description: "退勤時刻"
  break_schedules:
    type: array
    items:
      type: object
      properties:
        number:
          type: number
          example: 2
          description: "休憩No.<br>休憩の1-5に対応します。"
        start:
          type: string
          format: time
          pattern: hh:mm
          example: "12:34"
          description: "休憩時刻"
        end:
          type: string
          format: time
          pattern: hh:mm
          example: "12:34"
          description: "復帰時刻"
  overtime_break_schedule:
    type: object
    properties:
      start:
        type: string
        format: time
        pattern: hh:mm
        example: "12:34"
        description: "スケジュール外休憩予定時刻"
      end:
        type: string
        format: time
        pattern: hh:mm
        example: "12:34"
        description: "スケジュール外復帰予定時刻"
  half_day_off:
    type: object
    properties:
      id:
        type: string
        example: "1"
        description: "半休設定ID"
      name:
        type: string
        example: "通常半休"
        description: "半休設定名"
  created_at:
    type: string
    format: datetime
    pattern: yyyy-MM-dd hh:mm:ss
    example: "2024-04-13 12:34:56"
    description: "作成日時"
  updated_at:
    type: string
    format: datetime
    pattern: yyyy-MM-dd hh:mm:ss
    example: "2024-04-13 12:34:56"
    description: "更新日時"
