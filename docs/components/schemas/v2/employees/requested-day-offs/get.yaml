type: object
properties:
  employee_id:
    type: string
    example: "JIN0001"
    description: "社員番号"
  requested_day_offs:
    type: array
    items:
      type: object
      properties:
        store:
          type: object
          properties:
            id:
              type: string
              example: "1"
              description: "打刻グループID"
            name:
              type: string
              example: "第一営業部グループ"
              description: "打刻グループ名"
        date:
          type: string
          format: date
          pattern: yyyy-MM-dd
          example: "2024-04-13"
          description: "対象日付"
        status:
          type: string
          example: "1"
          description: "休日休暇申請ステータス<br>0:未対応<br>1:承認<br>2:否認"
        day_off_classification:
          type: object
          properties:
            id:
              type: string
              example: "1"
              description: "休日休暇名ID<br>0:年次有休<br>1:振休<br>2:代休<br>3:特別休暇"
            name:
              type: string
              example: "振休"
              description: "休日休暇名"
        duration_classification:
          type: object
          properties:
            id:
              type: string
              example: "1"
              description: "休日休暇種別ID<br>0:全日<br>1:半休<br>2:時間休"
            name:
              type: string
              example: "半休"
              description: "休日休暇種別"
            start_time:
              type: string
              format: datetime
              pattern: yyyy-MM-dd hh:mm:ss
              example: "2024-04-13 12:34:56"
              description: "休日休暇開始時間"
            end_time:
              type: string
              format: datetime
              pattern: yyyy-MM-dd hh:mm:ss
              example: "2024-04-13 12:34:56"
              description: "休日休暇終了時間"
        reason:
          type: string
          example: "◯◯という備考です。"
          description: "休日休暇理由"
        applied_at:
          type: string
          format: date
          pattern: yyyy-MM-dd
          example: "2024-04-13"
          description: "適用日"
        created_at:
          type: string
          format: datetime
          pattern: yyyy-MM-dd hh:mm:ss
          example: "2024-04-13 12:34:56"
          description: "作成日時"
        updated_at:
          type: string
          format: datetime
          pattern: yyyy-MM-dd hh:mm:ss
          example: "2024-04-13 12:34:56"
          description: "更新日時"
