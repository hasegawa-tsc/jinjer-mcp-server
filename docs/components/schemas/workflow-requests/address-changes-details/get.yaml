type: object
properties:
  id:
    type: string
    example: "JN0000000001AA"
    description: "申請書No."
  request_category:
    type: object
    properties:
      id:
        type: string
        example: "1"
        description: "申請区分ID"
      name:
        type: string
        example: "人事"
        description: "申請区分名"
  request_form:
    type: object
    properties:
      id:
        type: string
        example: "6"
        description: "申請フォームID"
      name:
        type: string
        example: "住所・通勤費変更申請"
        description: "申請フォーム名"
  status:
    type: object
    properties:
      id:
        type: string
        example: "1"
        description: "ステータスID<br>1:承認完了<br>2:進行中<br>3:否認<br>4:取下げ<br>7:差し戻し"
      name:
        type: string
        example: "承認完了"
        description: "ステータス"
  requester:
    type: object
    properties:
      id:
        type: string
        example: "JIN0001"
        description: "申請者 > 社員番号"
      last_name:
        type: string
        example: "神社"
        description: "申請者 > 職場氏名（氏）"
      first_name:
        type: string
        example: "一郎"
        description: "申請者 > 職場氏名（名）"
      department:
        type: object
        properties:
          id:
            type: string
            example: "1"
            description: "申請者 > 所属グループID"
          name:
            type: string
            example: "第一営業部"
            description: "申請者 > 所属グループ名"
  last_approver:
    type: object
    properties:
      id:
        type: string
        example: "JIN0002"
        description: "最終承認者 > 社員番号"
      last_name:
        type: string
        example: "神社"
        description: "最終承認者 > 職場氏名（氏）"
      first_name:
        type: string
        example: "二郎"
        description: "最終承認者 > 職場氏名（名）"
      comment:
        type: string
        example: "承認しました。"
        description: "最終承認者 > コメント"
  title:
    type: string
    example: "【2024年4月】中途採用者入社申請"
    description: "件名"
  remarks:
    type: string
    example: "◯◯という備考です。"
    description: "備考"
  reason:
    type: string
    example: "◯◯という理由です。"
    description: "理由"
  request_url:
    type: string
    example: "https://employee.jinjer.biz/request/confirm/12345/12345"
    description: "申請書URL"
  requested_at:
    type: string
    format: datetime
    pattern: yyyy-MM-dd hh:mm:ss
    example: "2024-04-13 12:34:56"
    description: "申請日時"
  last_approved_at:
    type: string
    format: datetime
    pattern: yyyy-MM-dd hh:mm:ss
    example: "2024-04-13 12:34:56"
    description: "最終承認（差し戻しを含む）日時または否認日時 "
  created_at:
    type: string
    format: datetime
    pattern: yyyy-MM-dd hh:mm:ss
    example: "2024-04-13 12:34:56"
    description: "作成日時"
  updated_at:
    type: string
    format: datetime
    pattern: yyyy-MM-dd hh:mm:ss
    example: "2024-04-13 12:34:56"
    description: "更新日時"
  approval_histories:
    type: array
    items:
      type: object
      properties:
        step:
          type: string
          example: "1"
          description: "承認履歴 > Step"
        approver:
          type: object
          properties:
            id:
              type: string
              example: "JIN0002"
              description: "承認履歴 > 対応者 > 社員番号"
            last_name:
              type: string
              example: "神社"
              description: "承認履歴 > 対応者 > 職場氏名（氏）"
            first_name:
              type: string
              example: "二郎"
              description: "承認履歴 > 対応者 > 職場氏名（名）"
        status_afterward:
          type: object
          properties:
            id:
              type: string
              example: "1"
              description: "承認履歴 > 対応内容ID<br>1:承認なし<br>2:申請<br>3:承認<br>4:差し戻し<br>5:否認"
            name:
              type: string
              example: "承認"
              description: "承認履歴 > 対応内容"
        approved_date:
          type: string
          format: datetime
          pattern: yyyy-MM-dd hh:mm:ss
          example: "2024-04-13 12:34:56"
          description: "承認履歴 > 対応日時"
        comment:
          type: string
          example: "承認しました。"
          description: "承認履歴 > コメント"
  viewing_histories:
    type: array
    items:
      type: object
      properties:
        viewer:
          type: object
          properties:
            id:
              type: string
              example: "JIN0002"
              description: "回覧者確認 > 回覧者 > 社員番号"
            last_name:
              type: string
              example: "神社"
              description: "回覧者確認 > 回覧者 > 職場氏名（氏）"
            first_name:
              type: string
              example: "二郎"
              description: "回覧者確認 > 回覧者 > 職場氏名（名）"
        status:
          type: object
          properties:
            id:
              type: string
              example: "1"
              description: "回覧者確認 > ステータスID<br>0:未対応 (回覧依頼未済)<br>1:未対応 (回覧依頼済)<br>2:回覧済み"
            name:
              type: string
              example: "未対応 (回覧依頼済)"
              description: "回覧者確認 > ステータス"
        viewed_date:
          type: string
          format: datetime
          pattern: yyyy-MM-dd hh:mm:ss
          example: "2024-04-13 12:34:56"
          description: "回覧者確認 > 回覧日時"
