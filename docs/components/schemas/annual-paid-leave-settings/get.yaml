type: object
properties:
  id:
    type: string
    example: "1"
    description: "年次有給休暇設定ID"
  name:
    type: string
    example: "正社員用"
    description: "年次有給休暇設定名"
  display_order:
    type: number
    example: 2
    description: "表示順"
  created_at:
    type: string
    format: datetime
    pattern: yyyy-MM-dd hh:mm:ss
    example: "2024-04-13 12:34:56"
    description: "作成日時"
  updated_at:
    type: string
    format: datetime
    pattern: yyyy-MM-dd hh:mm:ss
    example: "2024-04-13 12:34:56"
    description: "更新日時"
