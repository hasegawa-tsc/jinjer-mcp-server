post:
  tags:
    - 勤怠 エクスポート
  summary: /v1/kintai-exports
  description: "勤怠 エクスポートを登録する。"
  operationId: post-kintai-exports
  security:
    - ApplicationJWT: []
  parameters:
    - $ref: ../../components/parameters/common.yaml#/components/parameters/contentType
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/kintai-exports/post_body.yaml
  responses:
    "200":
      description: OK
      headers:
        $ref: ../../components/responseHeader/responseHeaderWithoutItemCount.yaml
      content:
        application/json:
          schema:
            type: object
            properties:
              results:
                type: string
                example: success
              data:
                $ref: ../../components/schemas/kintai-exports/post.yaml
    "400":
      $ref: ../../components/responses/common.yaml#/components/responses/commonResponse400
    "401":
      $ref: ../../components/responses/common.yaml#/components/responses/commonResponse401
    "403":
      $ref: ../../components/responses/common.yaml#/components/responses/commonResponse403
    "404":
      $ref: ../../components/responses/common.yaml#/components/responses/commonResponse404
    "405":
      $ref: ../../components/responses/common.yaml#/components/responses/commonResponse405
get:
  tags:
    - 勤怠 エクスポート
  summary: /v1/kintai-exports
  description: "勤怠 エクスポートを取得する。"
  operationId: get-kintai-exports
  security:
    - ApplicationJWT: []
  parameters:
    - name: page
      in: query
      schema:
        type: integer
        example: 1
        description: "クエリパラメータが無い場合、50件返却します。<br>51-100件目を取得したい場合、`page=2` を指定してください。"
    - name: executor-id
      in: query
      schema:
        type: string
        example: "JIN0001"
        description: "指定された社員番号を実行者とするエクスポート処理のデータを返却します。<br>社員番号が指定されていない場合、マスタアカウントで実行されたエクスポート処理のデータを返却します。"
  responses:
    "200":
      description: OK
      headers:
        $ref: ../../components/responseHeader/responseHeader.yaml
      content:
        application/json:
          schema:
            type: object
            properties:
              results:
                type: string
                example: success
              data:
                type: array
                items:
                  $ref: ../../components/schemas/kintai-exports/get.yaml
    "400":
      $ref: ../../components/responses/common.yaml#/components/responses/commonResponse400
    "401":
      $ref: ../../components/responses/common.yaml#/components/responses/commonResponse401
    "403":
      $ref: ../../components/responses/common.yaml#/components/responses/commonResponse403
    "404":
      $ref: ../../components/responses/common.yaml#/components/responses/commonResponse404
    "405":
      $ref: ../../components/responses/common.yaml#/components/responses/commonResponse405
