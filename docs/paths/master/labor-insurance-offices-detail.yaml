get:
  tags:
    - 労保事業所マスタ
  summary: /v1/master/labor-insurance-offices/{id}
  description: "労保事業所マスタ詳細を取得する。"
  operationId: Labor-insurance-officesGet-by-id
  security:
    - ApplicationJWT: []
  parameters:
  - name: id
    in: path
    schema:
      type: string
      example: 1
      description: "労働保険事業所コードを1つ指定できます。"
    required: true
  responses:
    "200":
      description: OK
      headers:
        $ref: ../../components/responseHeader/responseHeaderWithoutItemCount.yaml
      content:
        application/json:
          schema:
            type: object
            properties:
              results:
                type: string
                example: success
              data:
                $ref: ../../components/schemas/master/labor-insurance-offices-detail/get.yaml
    '400':
      $ref: ../../components/responses/common.yaml#/components/responses/commonResponse400
    '401':
      $ref: ../../components/responses/common.yaml#/components/responses/commonResponse401
    '403':
      $ref: ../../components/responses/common.yaml#/components/responses/commonResponse403
    '404':
      $ref: ../../components/responses/common.yaml#/components/responses/commonResponse404
    '405':
      $ref: ../../components/responses/common.yaml#/components/responses/commonResponse405
