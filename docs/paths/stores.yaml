get:
  tags:
    - 打刻グループマスタ
  summary: /v1/stores
  description: '打刻グループマスタを取得する。'
  operationId: storesGet
  security:
    - ApplicationJWT: []
  parameters:
    - $ref: ../components/parameters/common.yaml#/components/parameters/page
    - $ref: ../components/parameters/common.yaml#/components/parameters/status
  responses:
    '200':
      description: OK
      headers:
        $ref: ../components/responseHeader/responseHeader.yaml
      content:
        application/json:
          schema:
            type: object
            properties:
              results:
                type: string
                example: success
              data:
                type: array
                items:
                  $ref: ../components/schemas/stores/get.yaml
    '400':
      $ref: ../components/responses/common.yaml#/components/responses/commonResponse400
    '401':
      $ref: ../components/responses/common.yaml#/components/responses/commonResponse401
    '403':
      $ref: ../components/responses/common.yaml#/components/responses/commonResponse403
    '404':
      $ref: ../components/responses/common.yaml#/components/responses/commonResponse404
    '405':
      $ref: ../components/responses/common.yaml#/components/responses/commonResponse405
post:
  tags:
    - 打刻グループマスタ
  summary: /v1/stores
  description: '打刻グループマスタを登録する。'
  operationId: storesPost
  security:
    - ApplicationJWT: []
  parameters:
    - $ref: ../components/parameters/common.yaml#/components/parameters/contentType
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/stores/post_body.yaml
  responses:
    '200':
      description: OK
      headers:
        $ref: ../components/responseHeader/responseHeaderWithoutItemCount.yaml
      content:
        application/json:
          schema:
            type: object
            properties:
              results:
                type: string
                example: success
              data:
                $ref: ../components/schemas/stores/post.yaml
    '400':
      $ref: ../components/responses/common.yaml#/components/responses/commonResponse400
    '401':
      $ref: ../components/responses/common.yaml#/components/responses/commonResponse401
    '403':
      $ref: ../components/responses/common.yaml#/components/responses/commonResponse403
    '404':
      $ref: ../components/responses/common.yaml#/components/responses/commonResponse404
    '405':
      $ref: ../components/responses/common.yaml#/components/responses/commonResponse405
patch:
  tags:
    - 打刻グループマスタ
  summary: /v1/stores
  description: '打刻グループマスタを更新する。'
  operationId: storesPatch
  security:
    - ApplicationJWT: []
  parameters:
    - $ref: ../components/parameters/common.yaml#/components/parameters/contentType
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/stores/patch_body.yaml
  responses:
    '200':
      description: OK
      headers:
        $ref: ../components/responseHeader/responseHeaderWithoutItemCount.yaml
      content:
        application/json:
          schema:
            type: object
            properties:
              results:
                type: string
                example: success
              data:
                $ref: ../components/schemas/stores/post.yaml
    '400':
      $ref: ../components/responses/common.yaml#/components/responses/commonResponse400
    '401':
      $ref: ../components/responses/common.yaml#/components/responses/commonResponse401
    '403':
      $ref: ../components/responses/common.yaml#/components/responses/commonResponse403
    '404':
      $ref: ../components/responses/common.yaml#/components/responses/commonResponse404
    '405':
      $ref: ../components/responses/common.yaml#/components/responses/commonResponse405
