post:
  tags:
    - 給与 エクスポート
  summary: /v1/salary-exports
  description: "給与 エクスポートを登録する。"
  operationId: post-salary-exports
  security:
    - ApplicationJWT: []
  parameters:
    - $ref: ../../components/parameters/common.yaml#/components/parameters/contentType
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/salary-exports/post_body.yaml
  responses:
    "200":
      description: OK
      headers:
        $ref: ../../components/responseHeader/responseHeaderWithoutItemCount.yaml
      content:
        application/json:
          schema:
            type: object
            properties:
              results:
                type: string
                example: success
              data:
                $ref: ../../components/schemas/salary-exports/post.yaml
    "400":
      $ref: ../../components/responses/common.yaml#/components/responses/commonResponse400
    "401":
      $ref: ../../components/responses/common.yaml#/components/responses/commonResponse401
    "403":
      $ref: ../../components/responses/common.yaml#/components/responses/commonResponse403
    "404":
      $ref: ../../components/responses/common.yaml#/components/responses/commonResponse404
    "405":
      $ref: ../../components/responses/common.yaml#/components/responses/commonResponse405
get:
  tags:
    - 給与 エクスポート
  summary: /v1/salary-exports
  description: "給与 エクスポートを取得する。"
  operationId: get-salary-exports
  security:
    - ApplicationJWT: []
  parameters:
    - $ref: ../../components/parameters/common.yaml#/components/parameters/page
    - name: template-name
      in: query
      schema:
        type: string
        example: "出力テンプレート"
        description: |
          指定された名称に出力テンプレート名が部分一致するデータを返却します。<br>
          名称が指定されていない場合、全データを返却します。
    - name: template-id
      in: query
      schema:
        type: string
        example: "1234567"
        description: |
          出力テンプレートID<br>
          出力テンプレートIDは `GET /v1/master/salary-export-templates` で得られる `id` の値で指定します。<br>
          カスタムテンプレート以外のIDは指定できません。<br>
          クエリパラメータが無い場合、条件に含めずデータを返却します。<br>
    - $ref: ../../components/parameters/common.yaml#/components/parameters/has-since-changed-at-new
  responses:
    "200":
      description: OK
      headers:
        $ref: ../../components/responseHeader/responseHeader.yaml
      content:
        application/json:
          schema:
            type: object
            properties:
              results:
                type: string
                example: success
              data:
                type: array
                items:
                  $ref: ../../components/schemas/salary-exports/get.yaml
    "400":
      $ref: ../../components/responses/common.yaml#/components/responses/commonResponse400
    "401":
      $ref: ../../components/responses/common.yaml#/components/responses/commonResponse401
    "403":
      $ref: ../../components/responses/common.yaml#/components/responses/commonResponse403
    "404":
      $ref: ../../components/responses/common.yaml#/components/responses/commonResponse404
    "405":
      $ref: ../../components/responses/common.yaml#/components/responses/commonResponse405
