get:
  tags:
    - 所属グループ
  summary: /v1/departments
  description: "所属グループを取得する。"
  operationId: departmentGet
  security:
    - ApplicationJWT: []
  parameters:
    - $ref: ../../components/parameters/common.yaml#/components/parameters/page
    - $ref: ../../components/parameters/common.yaml#/components/parameters/status
    - $ref: ../../components/parameters/common.yaml#/components/parameters/has-since-changed-at
    - name: id
      in: query
      schema:
        type: string
        example: 1
        description: "所属グループIDを指定します。<br>クエリパラメータがない場合、条件に含めずデータを返却します。"
    - name: parent-department-id
      in: query
      schema:
        type: string
        example: 1
        description: "親所属グループIDを指定します。<br>クエリパラメータがない場合、条件に含めずデータを返却します。"
    - name: manager-employee-id
      in: query
      schema:
        type: string
        example: 1
        description: "所属長の社員番号を指定します。<br>クエリパラメータがない場合、条件に含めずデータを返却します。"
  responses:
    "200":
      description: OK
      headers:
        $ref: ../../components/responseHeader/responseHeader.yaml
      content:
        application/json:
          schema:
            type: object
            properties:
              results:
                type: string
                example: success
              data:
                type: array
                items:
                  $ref: ../../components/schemas/departments/department/get.yaml
    '400':
      $ref: ../../components/responses/common.yaml#/components/responses/commonResponse400
    '401':
      $ref: ../../components/responses/common.yaml#/components/responses/commonResponse401
    '403':
      $ref: ../../components/responses/common.yaml#/components/responses/commonResponse403
    '404':
      $ref: ../../components/responses/common.yaml#/components/responses/commonResponse404
    '405':
      $ref: ../../components/responses/common.yaml#/components/responses/commonResponse405
