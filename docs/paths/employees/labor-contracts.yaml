get:
  tags:
    - 従業員 労働契約
  summary: /v1/employees/labor-contracts
  description: "従業員に紐づく労働契約を取得する。"
  operationId: Employees_labor-contractsGetList
  security:
    - ApplicationJWT: []
  parameters:
    - $ref: ../../components/parameters/common.yaml#/components/parameters/page
    - $ref: ../../components/parameters/common.yaml#/components/parameters/employee-ids
    - $ref: ../../components/parameters/common.yaml#/components/parameters/has-since-changed-at
    - name: contract-on-period-start-date
      in: query
      schema:
        type: string
        format: date
        pattern: "yyyy-MM-dd"
        example: "2023-01-01"
        description: "契約年月日が指定された年月日以前であるデータを返却します。<br>年月日が指定されていなかったら全データを返却します。"
    - name: contract-on-period-end-date
      in: query
      schema:
        type: string
        format: date
        pattern: "yyyy-MM-dd"
        example: "2023-01-01"
        description: "契約年月日が指定された年月日以降であるデータを返却します。<br>年月日が指定されていなかったら全データを返却します。"
    - name: period-start-on-period-start-date
      in: query
      schema:
        type: string
        format: date
        pattern: "yyyy-MM-dd"
        example: "2023-01-01"
        description: "開始年月日が指定された年月日以前であるデータを返却します。<br>年月日が指定されていなかったら全データを返却します。"
    - name: period-start-on-period-end-date
      in: query
      schema:
        type: string
        format: date
        pattern: "yyyy-MM-dd"
        example: "2023-01-01"
        description: "開始年月日が指定された年月日以降であるデータを返却します。<br>年月日が指定されていなかったら全データを返却します。"
    - name: period-end-period-start-date
      in: query
      schema:
        type: string
        format: date
        pattern: "yyyy-MM-dd"
        example: "2023-01-01"
        description: "満了年月日が指定された年月日以前であるデータを返却します。<br>年月日が指定されていなかったら全データを返却します。"
    - name: period-end-period-end-date
      in: query
      schema:
        type: string
        format: date
        pattern: "yyyy-MM-dd"
        example: "2023-01-01"
        description: "満了年月日が指定された年月日以降であるデータを返却します。<br>年月日が指定されていなかったら全データを返却します。"
    - name: fixed-term-classification-id
      in: query
      schema:
        type: integer
        example: 1
        description: "期間の定め<br>下記のいずれかを指定できます。<br>0:未選択<br>1:あり<br>2:なし<br>クエリパラメータが無い場合、条件に含めずデータを返却します。"
    - name: update-status-classification-id
      in: query
      schema:
        type: integer
        example: 1
        description: "更新ステータス<br>下記のいずれかを指定できます。<br>0:未選択<br>1:更新済<br>2:更新不要<br>クエリパラメータが無い場合、条件に含めずデータを返却します。"
    - name: renewal-classification-id
      in: query
      schema:
        type: integer
        example: 1
        description: "契約更新の有無<br>下記のいずれかを指定できます。<br>0:未選択<br>1:自動更新<br>2:更新することがある<br>3:更新しない<br>クエリパラメータが無い場合、条件に含めずデータを返却します。"
  responses:
    "200":
      description: OK
      headers:
        $ref: ../../components/responseHeader/responseHeader.yaml
      content:
        application/json:
          schema:
            type: object
            properties:
              results:
                type: string
                example: success
              data:
                type: array
                items:
                  $ref: ../../components/schemas/employees/labor-contracts/get.yaml
    "400":
      $ref: ../../components/responses/common.yaml#/components/responses/commonResponse400
    "401":
      $ref: ../../components/responses/common.yaml#/components/responses/commonResponse401
    "403":
      $ref: ../../components/responses/common.yaml#/components/responses/commonResponse403
    "404":
      $ref: ../../components/responses/common.yaml#/components/responses/commonResponse404
    "405":
      $ref: ../../components/responses/common.yaml#/components/responses/commonResponse405
