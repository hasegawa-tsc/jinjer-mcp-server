get:
  tags:
    - 従業員 勤務データ（月締め）
  summary: /v1/employees/monthly-work-data
  description: "従業員に紐づく勤務データ（月締め）を取得する。"
  operationId: employees-monthly-work-dataGet
  security:
    - ApplicationJWT: []
  parameters:
    - $ref: ../../components/parameters/common.yaml#/components/parameters/page
    - $ref: ../../components/parameters/common.yaml#/components/parameters/employee-ids
    - name: month
      in: query
      schema:
        type: string
        format: date
        pattern: yyyy-MM
        example: 2023-01
        description: "取得する勤務データの年月を指定します。"
      required: true
    - name: group-id
      in: query
      schema:
        type: string
        example: Group1
        description: "所属グループを1つのみ指定します。<br>所属グループは `GET /v1/departments` で得られる `id` の値（所属グループID）で指定します。<br>所属グループまたは打刻グループのいずれかの指定が必須です。<br>打刻グループ単位、所属グループ単位の両方で締め処理がおこなわれた場合も、打刻グループと所属グループの両方を指定することはできず、指定された方で締めた時点の勤務データが返却されます。"
      required: true
    - name: store-id
      in: query
      schema:
        type: string
        example: Store1
        description: "打刻グループを1つのみ指定します。<br>打刻グループは `GET /v1/stores` で得られる `id` の値（打刻グループID）で指定します。<br>所属グループまたは打刻グループのいずれかの指定が必須です。<br>打刻グループ単位、所属グループ単位の両方で締め処理がおこなわれた場合も、打刻グループと所属グループの両方を指定することはできず、指定された方で締めた時点の勤務データが返却されます。"
      required: true
  responses:
    "200":
      description: OK
      headers:
        $ref: ../../components/responseHeader/responseHeader.yaml
      content:
        application/json:
          schema:
            type: object
            properties:
              results:
                type: string
                example: success
              data:
                type: array
                items:
                  $ref: ../../components/schemas/employees/monthly-work-data/get.yaml
    '400':
      $ref: ../../components/responses/common.yaml#/components/responses/commonResponse400
    '401':
      $ref: ../../components/responses/common.yaml#/components/responses/commonResponse401
    '403':
      $ref: ../../components/responses/common.yaml#/components/responses/commonResponse403
    '404':
      $ref: ../../components/responses/common.yaml#/components/responses/commonResponse404
    '405':
      $ref: ../../components/responses/common.yaml#/components/responses/commonResponse405
