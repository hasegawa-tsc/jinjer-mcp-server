get:
  tags:
    - 従業員 特別休暇
  summary: /v1/employees/special-holidays
  description: "従業員に紐づく特別休暇を取得する。"
  operationId: get-special-holidays
  security:
    - ApplicationJWT: []
  parameters:
    - $ref: ../../components/parameters/common.yaml#/components/parameters/page
    - $ref: ../../components/parameters/common.yaml#/components/parameters/employee-ids
    - name: is-cancelled
      in: query
      schema:
        type: boolean
        example: false
        description: "キャンセルフラグを指定します。<br>下記のいずれかを指定できます。<br>true:キャンセルされた休暇<br>false:キャンセルされていない休暇<br>クエリパラメータが無い場合、条件に含めずデータを返却します。"
    - name: special-holiday-setting-id
      in: query
      schema:
        type: string
        example: "1"
        description: "特別休暇設定IDを指定します。<br>特別休暇設定IDは `GET /v1/special-holiday-settings` で得られる `id` の値で指定します。クエリパラメータが無い場合、条件に含めずデータを返却します。"
    - $ref: ../../components/parameters/common.yaml#/components/parameters/has-since-changed-at
  responses:
    "200":
      description: OK
      headers:
        $ref: ../../components/responseHeader/responseHeader.yaml
      content:
        application/json:
          schema:
            type: object
            properties:
              results:
                type: string
                example: success
              data:
                type: array
                items:
                  $ref: ../../components/schemas/employees/special-holidays/get.yaml
    "400":
      $ref: ../../components/responses/common.yaml#/components/responses/commonResponse400
    "401":
      $ref: ../../components/responses/common.yaml#/components/responses/commonResponse401
    "403":
      $ref: ../../components/responses/common.yaml#/components/responses/commonResponse403
    "404":
      $ref: ../../components/responses/common.yaml#/components/responses/commonResponse404
    "405":
      $ref: ../../components/responses/common.yaml#/components/responses/commonResponse405
post:
  tags:
    - 従業員 特別休暇
  summary: /v1/employees/special-holidays
  description: "従業員に紐づく特別休暇を登録する。"
  operationId: post-special-holidays
  security:
    - ApplicationJWT: []
  parameters:
    - $ref: ../../components/parameters/common.yaml#/components/parameters/contentType
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/employees/special-holidays/post_body.yaml
  responses:
    "200":
      description: OK
      headers:
        $ref: ../../components/responseHeader/responseHeaderWithoutItemCount.yaml
      content:
        application/json:
          schema:
            type: object
            properties:
              results:
                type: string
                example: success
              data:
                $ref: ../../components/schemas/employees/special-holidays/post.yaml
    "400":
      $ref: ../../components/responses/common.yaml#/components/responses/commonResponse400
    "401":
      $ref: ../../components/responses/common.yaml#/components/responses/commonResponse401
    "403":
      $ref: ../../components/responses/common.yaml#/components/responses/commonResponse403
    "404":
      $ref: ../../components/responses/common.yaml#/components/responses/commonResponse404
    "405":
      $ref: ../../components/responses/common.yaml#/components/responses/commonResponse405
