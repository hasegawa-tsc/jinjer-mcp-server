get:
  tags:
    - 従業員 事業所社保・労保
  summary: /v1/employees/social-and-labor-insurance-offices
  description: "従業員に紐づく事業所社保・労保情報を取得する。"
  operationId: Employees_social-and-labor-insurance-officesGetList
  security:
    - ApplicationJWT: []
  parameters:
    - $ref: ../../components/parameters/common.yaml#/components/parameters/page
    - $ref: ../../components/parameters/common.yaml#/components/parameters/employee-ids
    - $ref: ../../components/parameters/common.yaml#/components/parameters/has-since-changed-at
    - name: master-office-id
      in: query
      schema:
        type: string
        example: "1"
        description: "指定された事業所マスタIDのデータを返却します。<br>事業所マスタIDは `GET /v1/master/social-and-labor-insurance-offices` で得られる `id` の値で指定します。<br>事業所マスタIDが指定されていない場合、全データを返却します。"
    - name: social-office-id
      in: query
      schema:
        type: string
        example: "1"
        description: "指定された社保事業所IDのデータを返却します。<br>社保事業所IDは `GET /v1/master/social-insurance-offices` で得られる `id` の値で指定します。<br>社保事業所IDが指定されていない場合、全データを返却します。"
    - name: labor-office-id
      in: query
      schema:
        type: string
        example: "1"
        description: "指定された労保事業所IDのデータを返却します。<br>労保事業所IDは `GET /v1/master/labor-insurance-offices` で得られる `id` の値で指定します。<br>労保事業所IDが指定されていない場合、全データを返却します。"
  responses:
    "200":
      description: OK
      headers:
        $ref: ../../components/responseHeader/responseHeader.yaml
      content:
        application/json:
          schema:
            type: object
            properties:
              results:
                type: string
                example: success
              data:
                type: array
                items:
                  $ref: ../../components/schemas/employees/social-and-labor-insurance-offices/get.yaml
    "400":
      $ref: ../../components/responses/common.yaml#/components/responses/commonResponse400
    "401":
      $ref: ../../components/responses/common.yaml#/components/responses/commonResponse401
    "403":
      $ref: ../../components/responses/common.yaml#/components/responses/commonResponse403
    "404":
      $ref: ../../components/responses/common.yaml#/components/responses/commonResponse404
    "405":
      $ref: ../../components/responses/common.yaml#/components/responses/commonResponse405
