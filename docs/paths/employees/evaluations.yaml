get:
  tags:
    - 従業員 評価
  summary: /v1/employees/evaluations
  description: "従業員に紐づく評価を取得する。"
  operationId: Employees_evaluationsGetList
  security:
    - ApplicationJWT: []
  parameters:
    - $ref: ../../components/parameters/common.yaml#/components/parameters/page
    - $ref: ../../components/parameters/common.yaml#/components/parameters/employee-ids
    - $ref: ../../components/parameters/common.yaml#/components/parameters/has-since-changed-at
    - name: evaluation-date
      in: query
      schema:
        type: string
        format: date
        pattern: "yyyy-MM-dd"
        example: "2023-01-01"
        description: "指定された評価実施年月日のデータを返却します。<br>年月日が指定されていなかったら全データを返却します。"
    - name: evaluation-period-start-date
      in: query
      schema:
        type: string
        format: date
        pattern: "yyyy-MM-dd"
        example: "2023-01-01"
        description: "人事評価対象期間（自）が指定された年月日以降のデータを返却します。<br>年月日が指定されていなかったら全データを返却します。<br>人事評価対象期間（自）の日付のみ指定されている場合、該当の人事評価対象期間（自）の日付以降のすべてのデータを返却します。"
    - name: evaluation-period-end-date
      in: query
      schema:
        type: string
        format: date
        pattern: "yyyy-MM-dd"
        example: "2023-01-01"
        description: "人事評価対象期間（至）が指定された年月日以前のデータを返却します。<br>年月日が指定されていなかったら全データを返却します。<br>人事評価対象期間（至）の日付のみ指定されている場合、該当の人事評価対象期間（至）の日付以前のすべてのデータを返却します。"
  responses:
    "200":
      description: OK
      headers:
        $ref: ../../components/responseHeader/responseHeader.yaml
      content:
        application/json:
          schema:
            type: object
            properties:
              results:
                type: string
                example: success
              data:
                type: array
                items:
                  $ref: ../../components/schemas/employees/evaluations/get.yaml
    "400":
      $ref: ../../components/responses/common.yaml#/components/responses/commonResponse400
    "401":
      $ref: ../../components/responses/common.yaml#/components/responses/commonResponse401
    "403":
      $ref: ../../components/responses/common.yaml#/components/responses/commonResponse403
    "404":
      $ref: ../../components/responses/common.yaml#/components/responses/commonResponse404
    "405":
      $ref: ../../components/responses/common.yaml#/components/responses/commonResponse405
