get:
  tags:
    - 従業員 主務
  summary: /v1/employees/affiliations
  description: "従業員に紐づく主務を取得する。"
  operationId: employeesaffiliationsGet
  security:
    - ApplicationJWT: []
  parameters:
    - $ref: ../../components/parameters/common.yaml#/components/parameters/page
    - $ref: ../../components/parameters/common.yaml#/components/parameters/employee-ids
    - $ref: ../../components/parameters/common.yaml#/components/parameters/has-since-changed-at
    - name: date-of-issue-after-at
      in: query
      schema:
        type: string
        format: date
        pattern: "yyyy-MM-dd"
        example: "2023-01-01"
        description: "指定された年月日以降の発令年月日を持つデータを返却します。<br>年月日が指定されていなかったら全データを返却します。"
    - name: date-of-issue-before-at
      in: query
      schema:
        type: string
        format: date
        pattern: "yyyy-MM-dd"
        example: "2023-06-01"
        description: "指定された年月日以前の発令年月日を持つデータを返却します。<br>年月日が指定されていなかったら全データを返却します。"
    - name: attendance-group
      in: query
      schema:
        type: string
        example: "A01"
        description: "指定された打刻グループIDのデータを返却します。<br>打刻グループIDは `GET /v1/stores` で得られる `id` の値で指定します。<br>打刻グループIDが指定されていなかったら全データを返却します。"
    - name: employee-post
      in: query
      schema:
        type: string
        example: "1"
        description: "指定された役職IDのデータを返却します。 <br>役職IDは `GET /v1/master/employee-posts` で得られる `id` の値で指定します。<br>役職IDが指定されていなかったら全データを返却します。"
    - name: department
      in: query
      schema:
        type: string
        example: "A01"
        description: "指定された所属グループIDのデータを返却します。<br>所属グループIDは `GET /v1/departments` で得られる `id` の値で指定します。<br>所属グループIDが指定されていなかったら全データを返却します。"
  responses:
    "200":
      description: OK
      headers:
        $ref: ../../components/responseHeader/responseHeader.yaml
      content:
        application/json:
          schema:
            type: object
            properties:
              results:
                type: string
                example: success
              data:
                type: array
                items:
                  $ref: ../../components/schemas/employees/affiliations/get.yaml
    "400":
      $ref: ../../components/responses/common.yaml#/components/responses/commonResponse400
    "401":
      $ref: ../../components/responses/common.yaml#/components/responses/commonResponse401
    "403":
      $ref: ../../components/responses/common.yaml#/components/responses/commonResponse403
    "404":
      $ref: ../../components/responses/common.yaml#/components/responses/commonResponse404
    "405":
      $ref: ../../components/responses/common.yaml#/components/responses/commonResponse405
