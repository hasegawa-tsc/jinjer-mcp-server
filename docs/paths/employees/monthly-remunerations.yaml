get:
  tags:
    - 従業員 報酬月額
  summary: /v1/employees/monthly-remunerations
  description: "従業員に紐づく報酬月額を取得する。"
  operationId: Employees_monthly-remunerationsGetList
  security:
    - ApplicationJWT: []
  parameters:
    - $ref: ../../components/parameters/common.yaml#/components/parameters/page
    - $ref: ../../components/parameters/common.yaml#/components/parameters/employee-ids
    - $ref: ../../components/parameters/common.yaml#/components/parameters/has-since-changed-at
    - name: year
      in: query
      schema:
        type: string
        format: date
        pattern: "yyyy"
        example: "2022"
        description: "指定された年のデータを返却します。<br>年が指定されていない場合、全データを返却します。<br>月を指定する場合、年の指定は必須です。"
    - name: month
      in: query
      schema:
        type: string
        format: date
        pattern: "MM"
        example: "12"
        description: "指定された月のデータを返却します。<br>月が指定されていない場合、全データを返却します。<br>年が指定されていない場合、月を指定することはできません。"
  responses:
    "200":
      description: OK
      headers:
        $ref: ../../components/responseHeader/responseHeader.yaml
      content:
        application/json:
          schema:
            type: object
            properties:
              results:
                type: string
                example: success
              data:
                type: array
                items:
                  $ref: ../../components/schemas/employees/monthly-remunerations/get.yaml
    "400":
      $ref: ../../components/responses/common.yaml#/components/responses/commonResponse400
    "401":
      $ref: ../../components/responses/common.yaml#/components/responses/commonResponse401
    "403":
      $ref: ../../components/responses/common.yaml#/components/responses/commonResponse403
    "404":
      $ref: ../../components/responses/common.yaml#/components/responses/commonResponse404
    "405":
      $ref: ../../components/responses/common.yaml#/components/responses/commonResponse405
