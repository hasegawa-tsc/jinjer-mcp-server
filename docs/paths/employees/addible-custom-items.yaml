get:
  tags:
    - 従業員 カスタム項目（項目追加）
  summary: /v1/employees/addible-custom-items
  description: "従業員に紐づくカスタム項目（項目追加）を取得する。"
  operationId: Employees_addible-custom-itemsGetList
  security:
    - ApplicationJWT: []
  parameters:
    - $ref: ../../components/parameters/common.yaml#/components/parameters/page
    - $ref: ../../components/parameters/common.yaml#/components/parameters/employee-ids
    - $ref: ../../components/parameters/common.yaml#/components/parameters/has-since-changed-at
    - $ref: ../../components/parameters/common.yaml#/components/parameters/date-from
    - $ref: ../../components/parameters/common.yaml#/components/parameters/date-to
    - $ref: ../../components/parameters/common.yaml#/components/parameters/customize-menu-id
      required: true
  responses:
    "200":
      description: OK
      headers:
        $ref: ../../components/responseHeader/responseHeader.yaml
      content:
        application/json:
          schema:
            type: object
            properties:
              results:
                type: string
                example: success
              data:
                type: array
                items:
                  $ref: ../../components/schemas/employees/addible-custom-items/get.yaml
    "400":
      $ref: ../../components/responses/common.yaml#/components/responses/commonResponse400
    "401":
      $ref: ../../components/responses/common.yaml#/components/responses/commonResponse401
    "403":
      $ref: ../../components/responses/common.yaml#/components/responses/commonResponse403
    "404":
      $ref: ../../components/responses/common.yaml#/components/responses/commonResponse404
    "405":
      $ref: ../../components/responses/common.yaml#/components/responses/commonResponse405
