get:
  tags:
    - 従業員 社員番号
  summary: /v1/employees/employee-ids
  description: "従業員に紐づく社員番号を取得する。"
  operationId: get-employee-ids
  security:
    - ApplicationJWT: []
  parameters:
    - $ref: ../../components/parameters/common.yaml#/components/parameters/page
    - name: employee-id
      in: query
      schema:
        type: string
        example: "JIN"
        description: "指定された値に社員番号が部分一致するデータを返却します。<br>値が指定されていない場合、全データを返却します。"
    - name: enrollment-classification-id
      in: query
      schema:
        type: string
        example: "0"
        description: "在籍区分<br>下記のいずれかを指定できます。<br>0:在籍<br>1:退職<br>2:休職<br>クエリパラメータが無い場合、条件に含めずデータを返却します。"
    - name: employment-classification-id
      in: query
      schema:
        type: string
        example: "1"
        description: "雇用区分<br>雇用区分は `/v1/master/employment-classifications` で得られる `id` の値（雇用区分ID）で指定します。<br>クエリパラメータが無い場合、条件に含めずデータを返却します。"
    - $ref: ../../components/parameters/common.yaml#/components/parameters/has-since-changed-at
  responses:
    "200":
      description: OK
      headers:
        $ref: ../../components/responseHeader/responseHeader.yaml
      content:
        application/json:
          schema:
            type: object
            properties:
              results:
                type: string
                example: success
              data:
                type: array
                items:
                  $ref: ../../components/schemas/employees/employee-ids/get.yaml
    "400":
      $ref: ../../components/responses/common.yaml#/components/responses/commonResponse400
    "401":
      $ref: ../../components/responses/common.yaml#/components/responses/commonResponse401
    "403":
      $ref: ../../components/responses/common.yaml#/components/responses/commonResponse403
    "404":
      $ref: ../../components/responses/common.yaml#/components/responses/commonResponse404
    "405":
      $ref: ../../components/responses/common.yaml#/components/responses/commonResponse405
patch:
  tags:
    - 従業員 社員番号
  summary: /v1/employees/employee-ids
  description: "従業員に紐づく社員番号を更新する。"
  operationId: patch-employee-ids
  security:
    - ApplicationJWT: []
  parameters:
    - $ref: ../../components/parameters/common.yaml#/components/parameters/contentType
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/employees/employee-ids/patch_body.yaml
  responses:
    "200":
      description: OK
      headers:
        $ref: ../../components/responseHeader/responseHeaderWithoutItemCount.yaml
      content:
        application/json:
          schema:
            type: object
            properties:
              results:
                type: string
                example: success
              data:
                $ref: ../../components/schemas/employees/employee-ids/patch.yaml
    "400":
      $ref: ../../components/responses/common.yaml#/components/responses/commonResponse400
    "401":
      $ref: ../../components/responses/common.yaml#/components/responses/commonResponse401
    "403":
      $ref: ../../components/responses/common.yaml#/components/responses/commonResponse403
    "404":
      $ref: ../../components/responses/common.yaml#/components/responses/commonResponse404
    "405":
      $ref: ../../components/responses/common.yaml#/components/responses/commonResponse405
